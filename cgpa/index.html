<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple CGPA Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1d3a;
    color:white;
    text-align:center;
}

header{
    padding:20px;
}

.container{
    width:90%;
    max-width:700px;
    margin:auto;
}

.card{
    background:#132850;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

input{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:8px;
    width:220px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0088cc;
}

#result{
    margin-top:20px;
    font-size:18px;
}

</style>
</head>

<body>

<header>
    <h1>🎯 Simple CGPA Dashboard</h1>
    <p>CGPA & Backlog Analyzer</p>
</header>

<div class="container">

    <!-- CGPA SECTION -->

    <div class="card">

        <h2>CGPA Calculator</h2>

        <input type="number" id="currentCGPA" placeholder="Current CGPA" step="0.1">

        <input type="number" id="targetCGPA" placeholder="Target CGPA" step="0.1">

        <br>

        <button onclick="calculateCGPA()">
            Calculate
        </button>

    </div>

    <!-- BACKLOG SECTION -->

    <div class="card">

        <h2>Backlog Analyzer</h2>

        <input type="text" id="failedSubject" placeholder="Failed Subject">

        <input type="number" id="cgpaDrop" placeholder="Expected CGPA Drop">

        <br>

        <button onclick="analyzeBacklog()">
            Analyze
        </button>

    </div>

    <!-- RESULT -->

    <div class="card">

        <h2>Results</h2>

        <div id="result">
            Your results will appear here.
        </div>

    </div>

</div>

<script>

function calculateCGPA(){

    let current =
    parseFloat(document.getElementById("currentCGPA").value);

    let target =
    parseFloat(document.getElementById("targetCGPA").value);

    let improvement = target - current;

    document.getElementById("result").innerHTML = `

        <p>📊 Current CGPA: <b>${current}</b></p>

        <p>🎯 Target CGPA: <b>${target}</b></p>

        <p>📈 Improvement Needed: <b>${improvement.toFixed(2)}</b></p>

    `;
}

function analyzeBacklog(){

    let subject =
    document.getElementById("failedSubject").value;

    let drop =
    parseFloat(document.getElementById("cgpaDrop").value);

    document.getElementById("result").innerHTML += `

        <hr>

        <p>❌ Failed Subject: <b>${subject}</b></p>

        <p>📉 Expected CGPA Drop: <b>${drop}</b></p>

    `;
}

</script>

</body>
</html>
